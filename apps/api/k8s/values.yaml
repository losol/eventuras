# Default values for eventuras-api
# Environment-specific values are set by Argo CD, not here

replicaCount: 1

image:
  registry: docker.io
  repository: losolio/eventuras-api
  tag: ""           # Set by ArgoCD
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 8080

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
    ephemeral-storage: "1Gi"
  limits:
    memory: "1Gi"
    cpu: "1000m"
    ephemeral-storage: "2Gi"

# Health check configuration
healthCheck:
  path: /health
  # Startup probe – allows up to ~5 min for EF migrations before killing the pod
  startupInitialDelaySeconds: 10
  startupPeriodSeconds: 10
  startupFailureThreshold: 30
  # Liveness / readiness (only active after startup succeeds)
  periodSeconds: 30
  timeoutSeconds: 10
  readinessPeriodSeconds: 60

# High-availability settings (disabled by default for single-node compatibility)
# Override in environment-specific values for prod
strategy: {}
#   type: RollingUpdate
#   rollingUpdate:
#     maxUnavailable: 0
#     maxSurge: 1

podDisruptionBudget:
  enabled: false
  minAvailable: 1

topologySpreadConstraints: []
#   - maxSkew: 1
#     topologyKey: kubernetes.io/hostname
#     whenUnsatisfiable: ScheduleAnyway
#     labelSelector:
#       matchLabels:
#         app: eventuras-api

# Pod annotations – merged onto template.metadata.annotations
# Use this to trigger rollouts on secret changes (e.g. Infisical auto-reload)
podAnnotations: {}
# e.g.
#   secrets.infisical.com/auto-reload: "true"

# Environment variables (non-sensitive)
env: {}
# Additional env vars set by provisioner:
#   ASPNETCORE_ENVIRONMENT: Production
# Note: ASPNETCORE_URLS is set automatically from service.targetPort in deployment.yaml

