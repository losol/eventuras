# Default values for eventuras-web workload
# Environment-specific values are set by Argo CD, not here

replicaCount: 1

image:
  registry: docker.io
  repository: losolio/eventuras-web
  tag: ""           # Set by ArgoCD
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 3000

resources:
  requests:
    memory: "512Mi"
    cpu: "200m"
    ephemeral-storage: "1Gi"
  limits:
    memory: "1Gi"
    cpu: "1000m"
    ephemeral-storage: "2Gi"

# Health check configuration
healthCheck:
  path: /api/healthz
  # Startup probe – allows up to ~5 min for cold start before killing the pod
  startupInitialDelaySeconds: 10
  startupPeriodSeconds: 10
  startupFailureThreshold: 30
  # Liveness / readiness (only active after startup succeeds)
  periodSeconds: 30
  timeoutSeconds: 5
  readinessPeriodSeconds: 10

# High-availability settings (disabled by default for single-node compatibility)
# Override in environment-specific values for prod
strategy: {}
#   type: RollingUpdate
#   rollingUpdate:
#     maxUnavailable: 0
#     maxSurge: 1

podDisruptionBudget:
  enabled: false
  minAvailable: 1

topologySpreadConstraints: []
#   - maxSkew: 1
#     topologyKey: kubernetes.io/hostname
#     whenUnsatisfiable: ScheduleAnyway
#     labelSelector:
#       matchLabels:
#         app: eventuras-web

# Pod annotations – merged onto template.metadata.annotations
# Use this to trigger rollouts on secret changes (e.g. Infisical auto-reload)
podAnnotations: {}
# e.g.
#   secrets.infisical.com/auto-reload: "true"

# Environment variables (non-sensitive)
env: {}
# Additional env vars set by provisioner:
#   NODE_ENV: production
#   PORT: "3000"
#   NEXT_PUBLIC_API_URL: "https://api-dev.eventuras.example.com"
#   NEXT_PUBLIC_APP_URL: "https://app-dev.eventuras.example.com"
# Sensitive values (tokens, secrets) belong in the eventuras-web-secrets k8s Secret.
