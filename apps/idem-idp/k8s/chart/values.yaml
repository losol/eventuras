# Default values for idem-idp
# Environment-specific values are set by Argo CD, not here

replicaCount: 1

image:
  registry: docker.io
  repository: losolio/idem-idp
  tag: ""           # Set by ArgoCD
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 3001

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
    ephemeral-storage: "1Gi"
  limits:
    memory: "512Mi"
    cpu: "500m"
    ephemeral-storage: "2Gi"

# Health check configuration
healthCheck:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  readinessPeriodSeconds: 10

# Pod annotations
podAnnotations: {}

# Environment variables (non-sensitive)
env: {}
# Set by ArgoCD:
#   NODE_ENV: production
#   PORT: "3001"
#   LOG_LEVEL: info
