# Default values for idem-idp
# Environment-specific values are set by Argo CD, not here

replicaCount: 1

image:
  registry: docker.io
  repository: losolio/idem-idp
  tag: ""           # Set by ArgoCD
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 3001

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
    ephemeral-storage: "1Gi"
  limits:
    memory: "512Mi"
    cpu: "500m"
    ephemeral-storage: "2Gi"

# Health check configuration
healthCheck:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  readinessPeriodSeconds: 10

# High-availability settings (disabled by default for single-node compatibility)
# Override in environment-specific values for prod
strategy: {}
#   type: RollingUpdate
#   rollingUpdate:
#     maxUnavailable: 0
#     maxSurge: 1

podDisruptionBudget:
  enabled: false
  minAvailable: 1

topologySpreadConstraints: []
#   - maxSkew: 1
#     topologyKey: kubernetes.io/hostname
#     whenUnsatisfiable: ScheduleAnyway
#     labelSelector:
#       matchLabels:
#         app: idem-idp

# Pod annotations
podAnnotations: {}

# Environment variables (non-sensitive)
env: {}
# Set by ArgoCD:
#   NODE_ENV: production
#   PORT: "3001"
#   LOG_LEVEL: info
