# Default values for converto (HTML-to-PDF microservice)
# This is a shared internal service – one instance per cluster.

replicaCount: 1

image:
  registry: docker.io
  repository: losolio/converto
  tag: ""           # Set by CI/CD
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 3100

# Resource limits – Playwright/Chromium is memory-intensive.
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
    ephemeral-storage: "512Mi"
  limits:
    memory: "1Gi"
    cpu: "1000m"
    ephemeral-storage: "2Gi"

# Health check configuration
healthCheck:
  path: /healthz
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5

# Pod-level security context
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Container-level security context
# Chromium sandbox requires either SYS_ADMIN or --no-sandbox.
# We use --no-sandbox (via PLAYWRIGHT_NOSANDBOX) and drop all capabilities instead,
# relying on container isolation (non-root, seccomp, network policies) for security.
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# Non-sensitive environment variables
env:
  HOST: "0.0.0.0"
  PORT: "3100"
  BASE_URL: "http://converto"
  PLAYWRIGHT_NOSANDBOX: "true"

# Pod annotations
podAnnotations: {}
