# Default values for idem-admin
# Environment-specific values are set by Argo CD, not here

replicaCount: 1

image:
  registry: ""      # Set by Argo: docker.io
  repository: ""    # Set by Argo: losolio/idem-admin
  tag: ""           # Set by Argo: sha-abc123, v1.2.3
  pullPolicy: IfNotPresent

dns:
  domain: ""        # Set by Argo: idem.losol.no
  prefix: ""        # Set by Argo: "admin-dev.", "admin-staging.", "admin."

service:
  port: 80
  targetPort: 3000

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
    ephemeral-storage: "1Gi"
  limits:
    memory: "512Mi"
    cpu: "500m"
    ephemeral-storage: "2Gi"

# High-availability settings (disabled by default for single-node compatibility)
# Override in environment-specific values for prod
strategy: {}
#   type: RollingUpdate
#   rollingUpdate:
#     maxUnavailable: 0
#     maxSurge: 1

podDisruptionBudget:
  enabled: false
  minAvailable: 1

topologySpreadConstraints: []
#   - maxSkew: 1
#     topologyKey: kubernetes.io/hostname
#     whenUnsatisfiable: ScheduleAnyway
#     labelSelector:
#       matchLabels:
#         app: idem-admin

env: {}
# Set by Argo:
#   NODE_ENV: production
#   PORT: "3000"
