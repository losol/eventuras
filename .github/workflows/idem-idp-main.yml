name: idem-idp - docker build & push

on:
  push:
    branches:
      - main
      - "feature/**"
      - "feat/**"
      - "fix/**"
      - "bugfix/**"
      - "chore/**"
      - "release/**"
    paths:
      - "apps/idem-idp/**"
      - ".github/workflows/idem-idp-main.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/idem-idp/**"
      - ".github/workflows/idem-idp-main.yml"

# avoid parallel runs fighting over tags
concurrency:
  group: idem-idp-docker-${{ github.ref }}
  cancel-in-progress: false

env:
  ORG: losolio
  IMAGE_NAME: idem-idp
  # BuildKit endpoint (deployed in arc-systems namespace)
  BUILDKIT_HOST: tcp://buildkit.arc-systems.svc:1234

jobs:
  docker:
    runs-on: arc-eventuras
    permissions:
      contents: read
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Remote Buildx driver — offloads builds to the BuildKit StatefulSet
      - name: Set up Buildx (remote BuildKit)
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver: remote
          endpoint: ${{ env.BUILDKIT_HOST }}

      - name: Login to Docker Hub
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # read version from app package.json
      - name: Read package version
        id: ver
        shell: bash
        run: |
          PKG="apps/idem-idp/package.json"
          V="$(jq -r '.version' "$PKG" 2>/dev/null || echo '0.0.0')"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # generate tags/labels
      # - canary: latest main branch build (for Argo CD staging)
      # - main-<sha>: main branch with sha (for traceability)
      # - edge: latest feature branch build (for Argo CD dev)
      # - edge-<sha>: feature branch with sha (for traceability)
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.ORG }}/${{ env.IMAGE_NAME }}
          tags: |
            # Main branch: canary + main-<sha>
            type=raw,value=canary,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=main-${{ steps.ver.outputs.sha }},enable=${{ github.ref == 'refs/heads/main' }}
            # Feature branches: edge + edge-<sha>
            type=raw,value=edge,enable=${{ github.ref != 'refs/heads/main' }}
            type=raw,value=edge-${{ steps.ver.outputs.sha }},enable=${{ github.ref != 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.revision=${{ steps.ver.outputs.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build & push
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: apps/idem-idp/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.version }}
            GIT_SHA=${{ steps.ver.outputs.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.ORG }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: ${{ github.event_name != 'pull_request' && format('type=registry,ref={0}/{1}:buildcache,mode=max', env.ORG, env.IMAGE_NAME) || '' }}
          provenance: false
