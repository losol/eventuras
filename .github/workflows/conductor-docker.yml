name: Conductor Docker

on:
  workflow_call:
    inputs:
      push:
        description: 'Push image to registry'
        type: boolean
        default: false
      channel:
        description: 'Tag channel: main (canary + main-sha) or edge (edge-sha)'
        type: string
        default: ''
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false

  push:
    tags:
      - '@eventuras/conductor@*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., @eventuras/conductor@1.0.0)'
        required: true

env:
  ORGANIZATION_NAME: losolio
  IMAGE_NAME: conductor

jobs:
  # ── Staging: build & push Docker image (canary) ──────────────
  docker:
    name: Docker build & push
    if: "!startsWith(github.ref, 'refs/tags/') && github.event_name != 'workflow_dispatch'"
    runs-on: ubuntu-latest
    outputs:
      docker_tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Read package version
        id: ver
        run: |
          V="$(jq -r '.version' apps/conductor/package.json 2>/dev/null || echo '0.0.0')"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.ORGANIZATION_NAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=canary,enable=${{ inputs.channel == 'main' }}
            type=raw,value=main-${{ steps.ver.outputs.sha }},enable=${{ inputs.channel == 'main' }}
            type=raw,value=edge-${{ steps.ver.outputs.sha }},enable=${{ inputs.channel == 'edge' }}
          labels: |
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.revision=${{ steps.ver.outputs.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Login to Docker Hub
        if: inputs.push
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: apps/conductor/Dockerfile
          platforms: ${{ inputs.channel == 'main' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Release: retag staging image for production ───────────────────
  check-release:
    name: Check release tag
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Check release tag
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi

          echo "Tag: $TAG"

          if [[ "$TAG" == @eventuras/conductor@* ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
            VERSION="${TAG#@eventuras/conductor@}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Conductor release: $VERSION"
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "Not a conductor release, skipping"
          fi

  run-ci:
    name: Run CI
    needs: check-release
    if: needs.check-release.outputs.is_release == 'true'
    uses: ./.github/workflows/conductor-ci.yml

  retag-for-release:
    name: Retag image for release
    runs-on: ubuntu-latest
    needs: [check-release, run-ci]
    if: needs.check-release.outputs.is_release == 'true'
    outputs:
      image-tag: ${{ steps.tags.outputs.primary-tag }}

    steps:
      - name: Checkout (resolve tag SHA)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Retag staging image for production
        id: tags
        env:
          VERSION: ${{ needs.check-release.outputs.version }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          RESOLVED_SHA="$(git rev-list -n 1 "${RELEASE_TAG}")"
          SHORT_SHA="${RESOLVED_SHA::7}"
          SOURCE_TAG="${ORGANIZATION_NAME}/${IMAGE_NAME}:main-${SHORT_SHA}"
          VERSION_TAG="${ORGANIZATION_NAME}/${IMAGE_NAME}:v${VERSION}"
          LATEST_TAG="${ORGANIZATION_NAME}/${IMAGE_NAME}:latest"

          echo "Pulling existing staging image: ${SOURCE_TAG}"
          docker pull "${SOURCE_TAG}"

          echo "Retagging to version: ${VERSION_TAG}"
          docker tag "${SOURCE_TAG}" "${VERSION_TAG}"
          docker push "${VERSION_TAG}"

          echo "Retagging to latest: ${LATEST_TAG}"
          docker tag "${SOURCE_TAG}" "${LATEST_TAG}"
          docker push "${LATEST_TAG}"

          echo "primary-tag=${VERSION_TAG}" >> $GITHUB_OUTPUT
