name: Datatable Publish

on:
  push:
    tags:
      - "@eventuras/datatable@*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., @eventuras/datatable@0.5.12)"
        required: true

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Resolve ref
        id: ref
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "ref=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "ref=$GITHUB_REF" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --filter @eventuras/datatable... --frozen-lockfile

      - name: Build package
        run: pnpm --filter @eventuras/datatable build

      - name: Publish to npm
        run: pnpm --filter @eventuras/datatable publish --access public --provenance --no-git-checks
