name: idem-idp Docker

on:
  # Called from _main.yml for staging builds
  workflow_call:
    inputs:
      push:
        description: 'Push image to registry'
        type: boolean
        default: false
      channel:
        description: 'Tag channel: main (canary + main-sha) or edge (edge-sha)'
        type: string
        default: ''
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false

  # Release: tag push or manual trigger
  push:
    tags:
      - '@eventuras/idem-idp@*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., @eventuras/idem-idp@1.0.0)'
        required: true


env:
  ORG: losolio
  IMAGE_NAME: idem-idp

jobs:
  # ── Staging: build & push Docker image (canary/edge) ──────────────
  docker:
    name: Docker build & push
    if: "!startsWith(github.ref, 'refs/tags/') && github.event_name != 'workflow_dispatch'"
    runs-on: ubuntu-latest
    outputs:
      docker_tags: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Read package version
        id: ver
        run: |
          V="$(jq -r '.version' apps/idem-idp/package.json 2>/dev/null || echo '0.0.0')"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.ORG }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=canary,enable=${{ inputs.channel == 'main' }}
            type=raw,value=main-${{ steps.ver.outputs.sha }},enable=${{ inputs.channel == 'main' }}
            type=raw,value=edge-${{ steps.ver.outputs.sha }},enable=${{ inputs.channel == 'edge' }}
          labels: |
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.revision=${{ steps.ver.outputs.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Login to Docker Hub
        if: inputs.push
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: apps/idem-idp/Dockerfile
          push: ${{ inputs.push }}
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.version }}
            GIT_SHA=${{ steps.ver.outputs.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Release: retag staging image for production ───────────────────
  check-release:
    name: Check release tag
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Check release tag
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi

          echo "Tag: $TAG"

          if [[ "$TAG" == @eventuras/idem-idp@* ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
            VERSION="${TAG#@eventuras/idem-idp@}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "idem-idp release: $VERSION"
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "Not an idem-idp release, skipping"
          fi

  run-ci:
    name: Run CI
    needs: check-release
    if: needs.check-release.outputs.is_release == 'true'
    uses: ./.github/workflows/idem-idp-ci.yml

  retag-for-release:
    name: Retag image for release
    runs-on: ubuntu-latest
    needs: [check-release, run-ci]
    if: needs.check-release.outputs.is_release == 'true'
    outputs:
      image-tag: ${{ steps.tags.outputs.primary-tag }}

    steps:
      - name: Checkout (resolve tag SHA)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Retag staging image for production
        id: tags
        env:
          VERSION: ${{ needs.check-release.outputs.version }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          RESOLVED_SHA="$(git rev-list -n 1 "${RELEASE_TAG}")"
          SHORT_SHA="${RESOLVED_SHA::7}"
          SOURCE_TAG="${ORG}/${IMAGE_NAME}:main-${SHORT_SHA}"
          VERSION_TAG="${ORG}/${IMAGE_NAME}:v${VERSION}"
          LATEST_TAG="${ORG}/${IMAGE_NAME}:latest"

          echo "Pulling existing staging image: ${SOURCE_TAG}"
          docker pull "${SOURCE_TAG}"

          echo "Retagging to version: ${VERSION_TAG}"
          docker tag "${SOURCE_TAG}" "${VERSION_TAG}"
          docker push "${VERSION_TAG}"

          echo "Retagging to latest: ${LATEST_TAG}"
          docker tag "${SOURCE_TAG}" "${LATEST_TAG}"
          docker push "${LATEST_TAG}"

          echo "primary-tag=${VERSION_TAG}" >> $GITHUB_OUTPUT
