name: API Docker

on:
  workflow_call:
    inputs:
      push:
        description: 'Push image to registry'
        type: boolean
        default: false
      channel:
        description: 'Tag channel: main or edge'
        type: string
        default: ''
    outputs:
      image_tag:
        description: 'Primary image tag (e.g. main-abc1234)'
        value: ${{ jobs.docker.outputs.image_tag }}
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      INFRA_DISPATCH_TOKEN:
        required: false
      INFRA_REPO:
        required: false

  push:
    tags:
      - '@eventuras/api@*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., @eventuras/api@0.7.1)'
        required: true

concurrency:
  group: api-docker-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

env:
  ORGANIZATION_NAME: losolio
  IMAGE_NAME: eventuras-api

jobs:
  # ── Staging: build & push Docker image (canary/edge) ──────────────
  docker:
    name: Docker build & push
    if: "!startsWith(github.ref, 'refs/tags/') && github.event_name != 'workflow_dispatch'"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./apps/api/
    outputs:
      docker_tags: ${{ steps.meta.outputs.tags }}
      image_tag: ${{ steps.ver.outputs.image_tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Read package version
        id: ver
        env:
          CHANNEL: ${{ inputs.channel }}
        run: |
          set -euo pipefail
          V="$(jq -r '.version' package.json 2>/dev/null || echo '0.0.0')"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          IMAGE_TAG="${CHANNEL}-${GITHUB_SHA::7}"
          if [[ ! "$IMAGE_TAG" =~ ^(main|release|edge)-[0-9a-f]{7}$ ]]; then
            echo "::error::Invalid image tag '${IMAGE_TAG}'"
            exit 1
          fi
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.ORGANIZATION_NAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=canary,enable=${{ inputs.channel == 'main' }}
            type=raw,value=main-${{ steps.ver.outputs.sha }},enable=${{ inputs.channel == 'main' }}
            type=raw,value=edge-${{ steps.ver.outputs.sha }},enable=${{ inputs.channel == 'edge' }}
          labels: |
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.revision=${{ steps.ver.outputs.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Compute migration metadata
        id: migr
        working-directory: ${{ github.workspace }}
        run: ./apps/api/scripts/migration-metadata.sh >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        if: inputs.push
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./apps/api/
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            eventuras.migrations.latest=${{ steps.migr.outputs.latest }}
            eventuras.migrations.count=${{ steps.migr.outputs.count }}
            eventuras.migrations.sha=${{ steps.migr.outputs.sha }}
          build-args: |
            BUILD_VERSION=${{ steps.ver.outputs.version }}
            BUILD_SHA=${{ steps.ver.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Release ────────────────────────────────────────────────────────
  check-release:
    name: Check release tag
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Validate release tag
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi

          echo "Tag: $TAG"

          if [[ "$TAG" =~ ^@eventuras/api@([0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "API release: $VERSION"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "Not a valid API release tag, skipping"
          fi

  run-ci:
    name: Run CI
    needs: check-release
    if: needs.check-release.outputs.is_release == 'true'
    uses: ./.github/workflows/api-ci.yml

  build-for-release:
    name: Build release image
    runs-on: ubuntu-latest
    needs: [check-release, run-ci]
    if: needs.check-release.outputs.is_release == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve checked-out commit SHA
        id: sha
        run: echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Compute migration metadata
        id: migr
        run: ./apps/api/scripts/migration-metadata.sh >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./apps/api/
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.ORGANIZATION_NAME }}/${{ env.IMAGE_NAME }}:v${{ needs.check-release.outputs.version }}
            ${{ env.ORGANIZATION_NAME }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.version=${{ needs.check-release.outputs.version }}
            org.opencontainers.image.revision=${{ steps.sha.outputs.commit }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            eventuras.migrations.latest=${{ steps.migr.outputs.latest }}
            eventuras.migrations.count=${{ steps.migr.outputs.count }}
            eventuras.migrations.sha=${{ steps.migr.outputs.sha }}
          build-args: |
            BUILD_VERSION=${{ needs.check-release.outputs.version }}
            BUILD_SHA=${{ steps.sha.outputs.commit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-dockerhub-readme:
    name: Update Docker Hub README
    runs-on: ubuntu-latest
    needs: [check-release, build-for-release]
    if: needs.check-release.outputs.is_release == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Update Docker Hub description
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          REPO: ${{ env.ORGANIZATION_NAME }}/${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail

          TOKEN=$(jq -n --arg u "${DOCKERHUB_USERNAME}" --arg p "${DOCKERHUB_TOKEN}" \
            '{username: $u, password: $p}' | \
            curl --fail -s -X POST https://hub.docker.com/v2/users/login/ \
              -H 'Content-Type: application/json' -d @- | jq -r .token)

          jq -n --rawfile readme apps/api/README.md '{full_description: $readme}' | \
            curl --fail -s -X PATCH "https://hub.docker.com/v2/repositories/${REPO}/" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H 'Content-Type: application/json' -d @-

  dispatch-release:
    name: Dispatch release to infra
    needs: [check-release, build-for-release]
    if: needs.check-release.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Trigger release
        env:
          GH_TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          INFRA_REPO: ${{ secrets.INFRA_REPO }}
          VERSION: ${{ needs.check-release.outputs.version }}
        run: |
          set -euo pipefail
          gh api "repos/${INFRA_REPO}/dispatches" \
            -f event_type=release-api \
            -f "client_payload[image_tag]=v${VERSION}"
