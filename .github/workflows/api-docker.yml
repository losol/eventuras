name: API Docker

on:
  # Called from _main.yml for staging builds
  workflow_call:
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

  # Release: tag push or manual trigger
  push:
    tags:
      - '@eventuras/api@*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., @eventuras/api@0.7.1)'
        required: true

permissions:
  contents: read

env:
  ORGANIZATION_NAME: losolio
  IMAGE_NAME: eventuras-api

jobs:
  # ── Staging: build & push Docker image (canary/edge) ──────────────
  docker:
    name: Docker build & push
    if: "!startsWith(github.ref, 'refs/tags/') && github.event_name != 'workflow_dispatch'"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/api/
    outputs:
      docker_tags: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Read package version
        id: ver
        run: |
          V="$(jq -r '.version' package.json 2>/dev/null || echo '0.0.0')"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.ORGANIZATION_NAME }}/${{ env.IMAGE_NAME }}
          tags: |
            # Main branch: canary + main-<sha>
            type=raw,value=canary,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=main-${{ steps.ver.outputs.sha }},enable=${{ github.ref == 'refs/heads/main' }}
            # Feature branches: edge + edge-<sha>
            type=raw,value=edge,enable=${{ github.ref != 'refs/heads/main' }}
            type=raw,value=edge-${{ steps.ver.outputs.sha }},enable=${{ github.ref != 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.revision=${{ steps.ver.outputs.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./apps/api/
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Release: retag staging image for production ───────────────────
  check-release:
    name: Check release tag
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      is_api_release: ${{ steps.check.outputs.is_api_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Check release tag
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi

          echo "Tag: $TAG"

          if [[ "$TAG" == @eventuras/api@* ]]; then
            echo "is_api_release=true" >> $GITHUB_OUTPUT
            VERSION="${TAG#@eventuras/api@}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "API release: $VERSION"
          else
            echo "is_api_release=false" >> $GITHUB_OUTPUT
            echo "Not an API release, skipping"
          fi

  run-ci:
    name: Run CI
    needs: check-release
    if: needs.check-release.outputs.is_api_release == 'true'
    uses: ./.github/workflows/api-ci.yml

  retag-for-release:
    name: Retag image for release
    runs-on: ubuntu-latest
    needs: [check-release, run-ci]
    if: needs.check-release.outputs.is_api_release == 'true'
    outputs:
      image-tag: ${{ steps.tags.outputs.primary-tag }}

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Retag staging image for production
        id: tags
        env:
          VERSION: ${{ needs.check-release.outputs.version }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          SOURCE_TAG="${{ env.ORGANIZATION_NAME }}/${{ env.IMAGE_NAME }}:main-${SHORT_SHA}"
          VERSION_TAG="${{ env.ORGANIZATION_NAME }}/${{ env.IMAGE_NAME }}:v${VERSION}"
          LATEST_TAG="${{ env.ORGANIZATION_NAME }}/${{ env.IMAGE_NAME }}:latest"

          echo "Pulling existing staging image: ${SOURCE_TAG}"
          docker pull "${SOURCE_TAG}"

          echo "Retagging to version: ${VERSION_TAG}"
          docker tag "${SOURCE_TAG}" "${VERSION_TAG}"
          docker push "${VERSION_TAG}"

          echo "Retagging to latest: ${LATEST_TAG}"
          docker tag "${SOURCE_TAG}" "${LATEST_TAG}"
          docker push "${LATEST_TAG}"

          echo "primary-tag=${VERSION_TAG}" >> $GITHUB_OUTPUT
