name: PR Checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24.x'
          cache: 'pnpm'
      - name: Install commitlint dependencies
        run: pnpm install --filter . --frozen-lockfile --prod=false
      - name: Lint commits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: pnpm exec commitlint --from "$BASE_SHA" --to "$HEAD_SHA" --verbose

  changeset-check:
    name: Changeset check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check for changesets
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if ls .changeset/*.md 2>/dev/null | grep -qv README; then
            echo "Changesets found"
          else
            echo "::warning::No changeset found."
            BODY="No changeset found. Consider running \`pnpm changeset\` or \`pnpm changeset:suggest\` locally."
            gh pr comment "$PR_NUMBER" --body "$BODY" --edit-last 2>/dev/null \
              || gh pr comment "$PR_NUMBER" --body "$BODY"
          fi
