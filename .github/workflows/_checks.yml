name: PR Checks

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize ]

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.x"
          cache: "pnpm"
      - name: Install commitlint dependencies
        run: pnpm install --filter . --frozen-lockfile --prod=false --ignore-scripts
      - name: Lint commits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: pnpm exec commitlint --from "$BASE_SHA" --to "$HEAD_SHA" --verbose

  changeset-check:
    name: Changeset check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check for changesets
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if ls .changeset/*.md 2>/dev/null | grep -qv README; then
            echo "Changesets found"
          else
            echo "::warning::No changeset found."
            BODY="No changeset found. Consider running \`pnpm changeset\` or \`pnpm changeset:suggest\` locally."
            gh pr comment "$PR_NUMBER" --body "$BODY" --edit-last 2>/dev/null \
              || gh pr comment "$PR_NUMBER" --body "$BODY"
          fi
