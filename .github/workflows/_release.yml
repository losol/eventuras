name: Release

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    name: Tag and release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      actions: write
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Publish (tag packages)
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm changeset:tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Releases
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          echo "$PUBLISHED" | jq -c '.[]' | while read -r pkg; do
            NAME=$(echo "$pkg" | jq -r '.name')
            VERSION=$(echo "$pkg" | jq -r '.version')
            TAG="${NAME}@${VERSION}"
            TITLE="$(echo "$NAME" | sed 's|@eventuras/||') v${VERSION}"

            echo "Creating release for ${TAG}"
            gh release create "$TAG" \
              --title "$TITLE" \
              --generate-notes \
              || echo "Failed to create release for ${TAG}"
          done

      - name: Trigger downstream workflows for released packages
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          echo "$PUBLISHED" | jq -c '.[]' | while read -r pkg; do
            NAME=$(echo "$pkg" | jq -r '.name')
            TAG="${NAME}@$(echo "$pkg" | jq -r '.version')"

            case "$NAME" in
              @eventuras/api)
                echo "Triggering Docker retag for API: ${TAG}"
                gh workflow run api-docker.yml -f "tag=${TAG}"
                ;;
              @eventuras/web)
                echo "Triggering Docker retag for Web: ${TAG}"
                gh workflow run web-docker.yml -f "tag=${TAG}"
                ;;
              @eventuras/logger)
                echo "Triggering npm publish for logger: ${TAG}"
                gh workflow run logger-publish.yml -f "tag=${TAG}"
                ;;
              @eventuras/scribo)
                echo "Triggering npm publish for scribo: ${TAG}"
                gh workflow run scribo-publish.yml -f "tag=${TAG}"
                ;;
              @eventuras/eslint-config)
                echo "Triggering npm publish for eslint-config: ${TAG}"
                gh workflow run eslint-config-publish.yml -f "tag=${TAG}"
                ;;
              @eventuras/typescript-config)
                echo "Triggering npm publish for typescript-config: ${TAG}"
                gh workflow run typescript-config-publish.yml -f "tag=${TAG}"
                ;;
              *)
                echo "No downstream workflow configured for package ${NAME} with tag ${TAG}"
                ;;
            esac
          done
