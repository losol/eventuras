name: Main CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  scope:
    name: Scope
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.check.outputs.web }}
      api: ${{ steps.check.outputs.api }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changes
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          else
            CHANGED=$(git diff --name-only "${PUSH_BEFORE}...${PUSH_AFTER}")
          fi

          echo "web=$(echo "$CHANGED" | grep -q '^apps/web/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "api=$(echo "$CHANGED" | grep -q '^apps/api/' && echo true || echo false)" >> $GITHUB_OUTPUT

  web-ci:
    name: Web CI
    needs: scope
    if: needs.scope.outputs.web == 'true'
    uses: ./.github/workflows/web-ci.yml

  web-docker:
    name: Web Docker
    needs: [scope, web-ci]
    if: needs.scope.outputs.web == 'true'
    uses: ./.github/workflows/web-docker.yml
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  api-ci:
    name: API CI
    needs: scope
    if: needs.scope.outputs.api == 'true'
    uses: ./.github/workflows/api-ci.yml

  api-docker:
    name: API Docker
    needs: [scope, api-ci]
    if: needs.scope.outputs.api == 'true'
    uses: ./.github/workflows/api-docker.yml
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
