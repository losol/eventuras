name: Main CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize]


# Job order: scope → app jobs (alphabetical) → generic jobs (commitlint, etc.)
jobs:
  scope:
    name: Scope
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.check.outputs.api }}
      conductor: ${{ steps.check.outputs.conductor }}
      convertoapi: ${{ steps.check.outputs.convertoapi }}
      historia: ${{ steps.check.outputs.historia }}
      idem-admin: ${{ steps.check.outputs.idem-admin }}
      idem-idp: ${{ steps.check.outputs.idem-idp }}
      ratio-ui: ${{ steps.check.outputs.ratio-ui }}
      scribo: ${{ steps.check.outputs.scribo }}
      web: ${{ steps.check.outputs.web }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Detect changes
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          else
            CHANGED=$(git diff --name-only "${PUSH_BEFORE}...${PUSH_AFTER}")
          fi

          echo "api=$(echo "$CHANGED" | grep -q '^apps/api/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "conductor=$(echo "$CHANGED" | grep -q '^apps/conductor/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "convertoapi=$(echo "$CHANGED" | grep -q '^apps/convertoapi/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "historia=$(echo "$CHANGED" | grep -q '^apps/historia/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "idem-admin=$(echo "$CHANGED" | grep -q '^apps/idem-admin/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "idem-idp=$(echo "$CHANGED" | grep -q '^apps/idem-idp/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "ratio-ui=$(echo "$CHANGED" | grep -q '^libs/ratio-ui/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "scribo=$(echo "$CHANGED" | grep -q '^libs/scribo/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "web=$(echo "$CHANGED" | grep -q '^apps/web/' && echo true || echo false)" >> $GITHUB_OUTPUT

  api-ci:
    name: API CI
    needs: scope
    if: needs.scope.outputs.api == 'true'
    uses: ./.github/workflows/api-ci.yml

  api-docker:
    name: API Docker
    needs: [scope, api-ci]
    if: needs.scope.outputs.api == 'true' && github.event_name == 'push'
    uses: ./.github/workflows/api-docker.yml
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  conductor-ci:
    name: Conductor CI
    needs: scope
    if: needs.scope.outputs.conductor == 'true'
    uses: ./.github/workflows/conductor-ci.yml

  conductor-docker:
    name: Conductor Docker
    needs: [scope, conductor-ci]
    if: needs.scope.outputs.conductor == 'true' && github.event_name == 'push'
    uses: ./.github/workflows/conductor-docker.yml
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  convertoapi-ci:
    name: ConvertoAPI CI
    needs: scope
    if: needs.scope.outputs.convertoapi == 'true'
    uses: ./.github/workflows/convertoapi-ci.yml

  convertoapi-docker:
    name: ConvertoAPI Docker
    needs: [scope, convertoapi-ci]
    if: needs.scope.outputs.convertoapi == 'true' && github.event_name == 'push'
    uses: ./.github/workflows/convertoapi-docker.yml
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  historia-ci:
    name: Historia CI
    needs: scope
    if: needs.scope.outputs.historia == 'true'
    uses: ./.github/workflows/historia-ci.yml

  historia-docker:
    name: Historia Docker
    needs: [scope, historia-ci]
    if: needs.scope.outputs.historia == 'true' && github.event_name == 'push'
    uses: ./.github/workflows/historia-docker.yml
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      CMS_SECRET: ${{ secrets.CMS_SECRET }}
      CMS_SENTRY_AUTH_TOKEN: ${{ secrets.CMS_SENTRY_AUTH_TOKEN }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
      CMS_SENTRY_ORG: ${{ secrets.CMS_SENTRY_ORG }}
      CMS_SENTRY_PROJECT: ${{ secrets.CMS_SENTRY_PROJECT }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  idem-admin-ci:
    name: idem-admin CI
    needs: scope
    if: needs.scope.outputs.idem-admin == 'true'
    uses: ./.github/workflows/idem-admin-ci.yml

  idem-admin-docker:
    name: idem-admin Docker
    needs: [scope, idem-admin-ci]
    if: needs.scope.outputs.idem-admin == 'true' && github.event_name == 'push'
    uses: ./.github/workflows/idem-admin-docker.yml
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  idem-idp-ci:
    name: idem-idp CI
    needs: scope
    if: needs.scope.outputs.idem-idp == 'true'
    uses: ./.github/workflows/idem-idp-ci.yml

  idem-idp-docker:
    name: idem-idp Docker
    needs: [scope, idem-idp-ci]
    if: needs.scope.outputs.idem-idp == 'true' && github.event_name == 'push'
    uses: ./.github/workflows/idem-idp-docker.yml
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  ratio-ci:
    name: Ratio UI CI
    needs: scope
    if: needs.scope.outputs.ratio-ui == 'true'
    uses: ./.github/workflows/ratio-ci.yml

  ratio-deploy:
    name: Ratio UI Deploy
    needs: [scope, ratio-ci]
    if: needs.scope.outputs.ratio-ui == 'true'
    uses: ./.github/workflows/ratio-deploy.yml
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}

  scribo-ci:
    name: Scribo CI
    needs: scope
    if: needs.scope.outputs.scribo == 'true'
    uses: ./.github/workflows/scribo-ci.yml

  scribo-deploy:
    name: Scribo Deploy
    needs: [scope, scribo-ci]
    if: needs.scope.outputs.scribo == 'true' && github.event_name == 'push'
    uses: ./.github/workflows/scribo-deploy.yml
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  web-ci:
    name: Web CI
    needs: scope
    if: needs.scope.outputs.web == 'true'
    uses: ./.github/workflows/web-ci.yml

  web-docker:
    name: Web Docker
    needs: [scope, web-ci]
    if: needs.scope.outputs.web == 'true' && github.event_name == 'push'
    uses: ./.github/workflows/web-docker.yml
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  commitlint:
    name: Commitlint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 10.28.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22.x'
          cache: 'pnpm'
      - name: Install commitlint dependencies
        run: pnpm install --filter . --frozen-lockfile --prod=false
      - name: Lint commits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: pnpm exec commitlint --from "$BASE_SHA" --to "$HEAD_SHA" --verbose

  changeset-check:
    name: Changeset check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check for changesets
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if ls .changeset/*.md 2>/dev/null | grep -qv README; then
            echo "Changesets found"
          else
            echo "::warning::No changeset found."
            BODY="No changeset found. Consider running \`pnpm changeset\` or \`pnpm changeset:suggest\` locally."
            gh pr comment "$PR_NUMBER" --body "$BODY" --edit-last 2>/dev/null \
              || gh pr comment "$PR_NUMBER" --body "$BODY"
          fi
