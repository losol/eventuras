name: API

on:
  push:
    branches: [main]
    paths: ['apps/api/**']
  pull_request:
    branches: [main]
    paths: ['apps/api/**']

concurrency:
  group: api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/api-ci.yml

  docker:
    name: Docker
    needs: ci
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/api-docker.yml
    with:
      push: ${{ github.event_name == 'push' }}
      channel: ${{ github.event_name == 'push' && 'main' || 'edge' }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  cd:
    name: Deliver to CD
    needs: docker
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to infra repo
        env:
          GH_TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
        run: |
          gh api repos/${{ secrets.INFRA_REPO }}/dispatches \
            -f event_type=deploy-api \
            -f "client_payload[image_tag]=${{ needs.docker.outputs.image_tag }}"
