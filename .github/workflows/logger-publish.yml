name: Logger Publish

on:
  push:
    tags:
      - "@eventuras/logger@*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., @eventuras/logger@0.7.0)"
        required: true

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Resolve ref
        id: ref
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "ref=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "ref=$GITHUB_REF" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --filter @eventuras/logger... --frozen-lockfile --ignore-scripts

      - name: Build package
        run: pnpm --filter @eventuras/logger build

      - name: Publish to npm
        run: pnpm --filter @eventuras/logger publish --access public --provenance --no-git-checks
