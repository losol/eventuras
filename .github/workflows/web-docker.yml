name: Web Docker

on:
  workflow_call:
    inputs:
      push:
        description: 'Push image to registry'
        type: boolean
        default: false
      channel:
        description: 'Tag channel: main or edge'
        type: string
        default: ''
    outputs:
      image_tag:
        description: 'Primary image tag (e.g. main-abc1234)'
        value: ${{ jobs.docker.outputs.image_tag }}
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      TURBO_TOKEN:
        required: false
      TURBO_TEAM:
        required: false
      INFRA_DISPATCH_TOKEN:
        required: false
      INFRA_REPO:
        required: false

  push:
    tags:
      - '@eventuras/web@*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., @eventuras/web@1.2.3)'
        required: true

concurrency:
  group: web-docker-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

env:
  ORGANIZATION_NAME: losolio
  IMAGE_NAME: eventuras-web

jobs:
  # ── Staging: build & push Docker image (canary/edge) ──────────────
  docker:
    name: Docker build & push
    if: "!startsWith(github.ref, 'refs/tags/') && github.event_name != 'workflow_dispatch'"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      docker_tags: ${{ steps.meta.outputs.tags }}
      image_tag: ${{ steps.ver.outputs.image_tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Read package version
        id: ver
        env:
          CHANNEL: ${{ inputs.channel }}
        run: |
          set -euo pipefail
          V="$(jq -r '.version' apps/web/package.json 2>/dev/null || echo '0.0.0')"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          IMAGE_TAG="${CHANNEL}-${GITHUB_SHA::7}"
          if [[ ! "$IMAGE_TAG" =~ ^(main|release|edge)-[0-9a-f]{7}$ ]]; then
            echo "::error::Invalid image tag '${IMAGE_TAG}'"
            exit 1
          fi
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.ORGANIZATION_NAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=canary,enable=${{ inputs.channel == 'main' }}
            type=raw,value=main-${{ steps.ver.outputs.sha }},enable=${{ inputs.channel == 'main' }}
            type=raw,value=edge-${{ steps.ver.outputs.sha }},enable=${{ inputs.channel == 'edge' }}
          labels: |
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.revision=${{ steps.ver.outputs.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Login to Docker Hub
        if: inputs.push
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            TURBO_TOKEN=${{ secrets.TURBO_TOKEN }}
            TURBO_TEAM=${{ secrets.TURBO_TEAM }}
          build-args: |
            GIT_SHA=${{ steps.ver.outputs.sha }}

  # ── Release ────────────────────────────────────────────────────────
  check-release:
    name: Check release tag
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Validate release tag
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi

          echo "Tag: $TAG"

          # Validate semver format
          if [[ "$TAG" =~ ^@eventuras/web@([0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Web release: $VERSION"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "Not a valid web release tag, skipping"
          fi

  run-ci:
    name: Run CI
    needs: check-release
    if: needs.check-release.outputs.is_release == 'true'
    uses: ./.github/workflows/web-ci.yml

  build-for-release:
    name: Build release image
    runs-on: ubuntu-latest
    needs: [check-release, run-ci]
    if: needs.check-release.outputs.is_release == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve checked-out commit SHA
        id: sha
        run: echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.ORGANIZATION_NAME }}/${{ env.IMAGE_NAME }}:v${{ needs.check-release.outputs.version }}
            ${{ env.ORGANIZATION_NAME }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.version=${{ needs.check-release.outputs.version }}
            org.opencontainers.image.revision=${{ steps.sha.outputs.commit }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_SHA=${{ steps.sha.outputs.commit }}

  update-dockerhub-readme:
    name: Update Docker Hub README
    runs-on: ubuntu-latest
    needs: [check-release, build-for-release]
    if: needs.check-release.outputs.is_release == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Update Docker Hub description
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          REPO: ${{ env.ORGANIZATION_NAME }}/${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail

          TOKEN=$(jq -n --arg u "${DOCKERHUB_USERNAME}" --arg p "${DOCKERHUB_TOKEN}" \
            '{username: $u, password: $p}' | \
            curl --fail -s -X POST https://hub.docker.com/v2/users/login/ \
              -H 'Content-Type: application/json' -d @- | jq -r .token)

          jq -n --rawfile readme apps/web/README.md '{full_description: $readme}' | \
            curl --fail -s -X PATCH "https://hub.docker.com/v2/repositories/${REPO}/" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H 'Content-Type: application/json' -d @-

  dispatch-release:
    name: Dispatch release to infra
    needs: [check-release, build-for-release]
    if: needs.check-release.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Trigger release
        env:
          GH_TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          INFRA_REPO: ${{ secrets.INFRA_REPO }}
          VERSION: ${{ needs.check-release.outputs.version }}
        run: |
          set -euo pipefail
          gh api "repos/${INFRA_REPO}/dispatches" \
            -f event_type=release-web \
            -f "client_payload[image_tag]=v${VERSION}"
