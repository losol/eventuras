name: ConvertoAPI

on:
  push:
    branches: [main]
    paths: ['apps/convertoapi/**']
  pull_request:
    branches: [main]
    paths: ['apps/convertoapi/**']

concurrency:
  group: convertoapi-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/convertoapi-ci.yml

  docker:
    name: Docker
    needs: ci
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/convertoapi-docker.yml
    with:
      push: ${{ github.event_name == 'push' }}
      channel: ${{ github.event_name == 'push' && 'main' || 'edge' }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
