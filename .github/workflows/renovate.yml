# Self-hosted Renovate
#
# One-time setup (do once, then forget):
#   1. Create a new GitHub App: https://github.com/settings/apps/new
#      - Name: e.g. "eventuras-renovate"
#      - Homepage URL: anything (e.g. repo URL)
#      - Webhook: uncheck "Active"
#      - Permissions (Repository):
#          Contents: Read and write
#          Issues: Read and write
#          Pull requests: Read and write
#          Workflows: Read and write
#          Metadata: Read-only
#          Dependabot alerts: Read-only
#      - Where can this app be installed: Only on this account
#   2. After create: note the App ID, generate a private key (.pem), install on losol/eventuras.
#   3. Add repo secrets:
#        RENOVATE_CLIENT_ID         -> the Client ID (e.g. Iv23li...) from the app's About section
#        RENOVATE_APP_PRIVATE_KEY   -> contents of the .pem (incl. BEGIN/END lines)

name: Renovate

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      logLevel:
        description: Renovate log level
        type: choice
        default: info
        options: [info, debug]

permissions: {}

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RENOVATE_CLIENT_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: renovatebot/github-action@8217b3fc286df088d7c27f3255fe8414463bc0fd # v46.1.15
        env:
          LOG_LEVEL: ${{ github.event.inputs.logLevel || 'info' }}
          NODE_OPTIONS: --max-old-space-size=8192
          RENOVATE_PLATFORM: github
          RENOVATE_REPOSITORIES: ${{ github.repository }}
        with:
          token: ${{ steps.app-token.outputs.token }}
          configurationFile: renovate.json
