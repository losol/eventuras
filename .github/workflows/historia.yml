name: Historia

on:
  push:
    branches: [main]
    paths: ['apps/historia/**']
  pull_request:
    branches: [main]
    paths: ['apps/historia/**']

concurrency:
  group: historia-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/historia-ci.yml

  docker:
    name: Docker
    needs: ci
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/historia-docker.yml
    with:
      push: ${{ github.event_name == 'push' }}
      channel: ${{ github.event_name == 'push' && 'main' || 'edge' }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      CMS_SECRET: ${{ secrets.CMS_SECRET }}
      CMS_SENTRY_AUTH_TOKEN: ${{ secrets.CMS_SENTRY_AUTH_TOKEN }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
      CMS_SENTRY_ORG: ${{ secrets.CMS_SENTRY_ORG }}
      CMS_SENTRY_PROJECT: ${{ secrets.CMS_SENTRY_PROJECT }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
