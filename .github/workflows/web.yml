name: Web

on:
  push:
    branches: [main]
    paths: ['apps/web/**']
  pull_request:
    branches: [main]
    paths: ['apps/web/**']

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/web-ci.yml

  docker:
    name: Docker
    needs: ci
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/web-docker.yml
    with:
      push: ${{ github.event_name == 'push' }}
      channel: ${{ github.event_name == 'push' && 'main' || 'edge' }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  cd:
    name: Deliver to CD
    needs: docker
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to infra repo
        env:
          GH_TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          INFRA_REPO: ${{ secrets.INFRA_REPO }}
          IMAGE_TAG: ${{ needs.docker.outputs.image_tag }}
        run: |
          gh api "repos/${INFRA_REPO}/dispatches" \
            -f event_type=deploy-web \
            -f "client_payload[image_tag]=${IMAGE_TAG}"
