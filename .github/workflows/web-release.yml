name: Web Release

on:
  push:
    tags:
      - '@eventuras/web@*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., @eventuras/web@0.9.0)'
        required: true


env:
  ORGANIZATION_NAME: losolio
  IMAGE_NAME: eventuras-web

jobs:
  check-release:
    name: Check release tag
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Check release tag
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi

          echo "Tag: $TAG"

          if [[ "$TAG" == @eventuras/web@* ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
            VERSION="${TAG#@eventuras/web@}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Web release: $VERSION"
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "Not a web release, skipping"
          fi

  ci:
    name: CI
    needs: check-release
    if: needs.check-release.outputs.is_release == 'true'
    uses: ./.github/workflows/web-ci.yml

  retag:
    name: Retag image for release
    runs-on: ubuntu-latest
    needs: [check-release, ci]
    if: needs.check-release.outputs.is_release == 'true'
    outputs:
      image-tag: ${{ steps.tags.outputs.primary-tag }}

    steps:
      - name: Checkout (resolve tag SHA)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Retag staging image for production
        id: tags
        env:
          VERSION: ${{ needs.check-release.outputs.version }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          RESOLVED_SHA="$(git rev-list -n 1 "${RELEASE_TAG}")"
          SHORT_SHA="${RESOLVED_SHA::7}"
          SOURCE_TAG="${ORGANIZATION_NAME}/${IMAGE_NAME}:main-${SHORT_SHA}"
          VERSION_TAG="${ORGANIZATION_NAME}/${IMAGE_NAME}:v${VERSION}"
          LATEST_TAG="${ORGANIZATION_NAME}/${IMAGE_NAME}:latest"

          echo "Pulling existing staging image: ${SOURCE_TAG}"
          docker pull "${SOURCE_TAG}"

          echo "Retagging to version: ${VERSION_TAG}"
          docker tag "${SOURCE_TAG}" "${VERSION_TAG}"
          docker push "${VERSION_TAG}"

          echo "Retagging to latest: ${LATEST_TAG}"
          docker tag "${SOURCE_TAG}" "${LATEST_TAG}"
          docker push "${LATEST_TAG}"

          echo "primary-tag=${VERSION_TAG}" >> $GITHUB_OUTPUT
